# Research Compass — development stack
#
# Supabase: npx supabase start --ignore-health-check  (host)
# Frontend: docker compose up frontend
#
# Or use: .\scripts\up.ps1

name: research-compass

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rc-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://host.docker.internal:54321}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  tools:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rc-tools
    profiles:
      - tools
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    entrypoint: ["npm"]
    command: ["run", "lint"]

volumes:
  frontend_node_modules:
